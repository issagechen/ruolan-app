name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ---- Dart 层：静态分析 + 单元测试 ----
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Static analysis
        run: flutter analyze
      - name: Run tests
        run: flutter test

  # ---- 原生层：C++ 语法检查 + Android 构建（Kotlin / 依赖 / gradle / 打包 .so）----
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      # 安装 build.gradle.kts 中固定的 NDK 版本（否则 gradle 会因找不到而失败）。
      - name: Install Android NDK 27 & CMake
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null 2>&1 || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;27.0.12077973" "cmake;3.22.1"

      # C++ 编译门禁：对 llama_wrapper.cpp 做 -fsyntax-only（采样链 / 换行损坏 / API 误用）。
      # 由于 .so 是预编译打包的，gradle 不会重编 C++，此步是 C++ 改动的唯一自动化验证。
      - name: C++ native syntax check (llama_wrapper.cpp)
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: bash scripts/check_native_cpp.sh

      - name: Install dependencies
        run: flutter pub get

      # 编译 Kotlin（LlamaBridge.listModels）、解析 flutter_secure_storage 原生依赖、
      # 校验 build.gradle.kts、打包 arm64-v8a 预编译 .so。
      - name: Build debug APK
        run: flutter build apk --debug
